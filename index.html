<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출/매입 관리 시스템 V14.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type="number"] { text-align: right; font-family: 'Courier New', monospace; }
        .stat-card { border-radius: 16px; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .row-pending { background-color: #fffaf5; }
        .row-unpaid { border-left: 5px solid #ef4444; }
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-6">

    <!-- 보안바 -->
    <div class="max-w-7xl mx-auto bg-slate-900 p-4 rounded-2xl shadow-xl mb-6 flex flex-wrap justify-between items-center gap-4 text-white">
        <div class="flex items-center space-x-3">
            <span class="bg-slate-700 p-2 rounded-lg">🔐</span>
            <input type="password" id="mainPwInput" placeholder="암호" class="p-2 rounded-lg w-24 text-center text-slate-900 font-bold outline-none">
            <button onclick="toggleAuth()" id="authBtn" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg font-bold transition-all">접속</button>
        </div>
        <div id="authStatus" class="text-orange-400 font-medium text-sm">⚠️ 데이터 보호 모드</div>
    </div>

    <div id="main-content" class="max-w-7xl mx-auto space-y-6">
        
        <!-- 대시보드 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">매출/매입 대시보드</h1>
                    <select id="yearSelect" onchange="filterList()" class="border-2 border-slate-100 rounded-xl px-3 py-1.5 font-bold text-slate-700 outline-none cursor-pointer"></select>
                </div>
                <button onclick="downloadExcel()" id="excelBtn" class="bg-slate-200 text-slate-400 px-5 py-2 rounded-xl font-bold cursor-not-allowed" disabled>📥 엑셀 저장</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="stat-card bg-blue-50/50 p-4">
                    <h2 id="q1-title" class="font-bold text-blue-900 mb-2 border-b border-blue-100 pb-1 text-sm">📅 상반기 합계</h2>
                    <div class="grid grid-cols-3 gap-2 text-xs">
                        <div><p class="text-slate-400">매출액</p><p id="q1-sales" class="font-bold text-blue-700">****</p></div>
                        <div><p class="text-slate-400">매입액</p><p id="q1-purchase" class="font-bold">****</p></div>
                        <div><p class="text-orange-400">무자료</p><p id="q1-nodata" class="font-bold text-orange-600">****</p></div>
                    </div>
                </div>
                <div class="stat-card bg-emerald-50/50 p-4">
                    <h2 id="q2-title" class="font-bold text-emerald-900 mb-2 border-b border-emerald-100 pb-1 text-sm">📅 하반기 합계</h2>
                    <div class="grid grid-cols-3 gap-2 text-xs">
                        <div><p class="text-slate-400">매출액</p><p id="q2-sales" class="font-bold text-emerald-700">****</p></div>
                        <div><p class="text-slate-400">매입액</p><p id="q2-purchase" class="font-bold">****</p></div>
                        <div><p class="text-orange-400">무자료</p><p id="q2-nodata" class="font-bold text-orange-600">****</p></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-rose-50 rounded-xl border border-rose-100 flex justify-between items-center">
                    <span class="font-bold text-rose-700 text-sm">🚨 총 미납 잔액</span>
                    <span id="total-unpaid" class="text-xl font-black text-rose-600">****</span>
                </div>
                <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100 flex justify-between items-center">
                    <span class="font-bold text-indigo-700 text-sm">📈 연간 총 이익</span>
                    <span id="total-profit" class="text-xl font-black text-indigo-600">****</span>
                </div>
                <div class="p-4 bg-slate-800 rounded-xl text-white flex justify-between items-center">
                    <span class="font-bold opacity-80 text-sm">📅 이번달 순익</span>
                    <span id="cur-month-profit" class="text-xl font-black text-blue-400">****</span>
                </div>
            </div>
        </div>

        <!-- 입력 폼 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 id="form-title" class="text-lg font-bold text-slate-800 mb-5">📝 데이터 입력 및 수정</h2>
            <input type="hidden" id="edit-id">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="input-fields">
                <input type="date" id="date" class="border-2 border-slate-100 p-3 rounded-xl bg-slate-50 outline-none focus:border-blue-400">
                <input type="text" id="customer" placeholder="고객명" class="border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-blue-400">
                <input type="text" id="address" placeholder="주소" class="border-2 border-slate-100 p-3 rounded-xl col-span-2 outline-none focus:border-blue-400">
                <input type="text" id="item" placeholder="품목 상세" class="border-2 border-slate-100 p-3 rounded-xl col-span-2 font-bold outline-none focus:border-blue-400">
                <input type="number" id="noDataInput" placeholder="무자료 금액" class="border-2 border-orange-100 p-3 rounded-xl bg-orange-50 font-bold text-orange-700 outline-none">
                <input type="number" id="purchasePrice" placeholder="매입가" class="border-2 border-slate-100 p-3 rounded-xl outline-none">
                <input type="number" id="salePrice" placeholder="판매가" class="border-2 border-slate-100 p-3 rounded-xl font-bold outline-none">
                <select id="paymentMethod" onchange="syncUnpaidStatus()" class="border-2 border-yellow-100 p-3 rounded-xl bg-yellow-50 font-bold outline-none">
                    <option value="세금계산서">세금계산서</option>
                    <option value="통장 입금">통장 입금</option>
                    <option value="카드 결제">카드 결제</option>
                    <option value="현금">현금</option>
                    <option value="미처리">⚠️ 미처리</option>
                </select>
                <select id="unpaidStatus" class="border-2 border-slate-100 p-3 rounded-xl outline-none">
                    <option value="입금완료">✅ 입금완료</option>
                    <option value="미납">🚨 미납</option>
                    <option value="미처리">⏳ 미처리</option>
                </select>
                <input type="text" id="memo" placeholder="비고" class="border-2 border-slate-100 p-3 rounded-xl col-span-2 outline-none">
                <button onclick="saveData()" class="col-span-1 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg active:scale-95 transition-all">저장</button>
                <button onclick="resetForm()" class="col-span-1 bg-slate-200 text-slate-600 p-3 rounded-xl font-bold">초기화</button>
            </div>

            <!-- 검색 및 필터 (최적화 영역) -->
            <div class="flex flex-wrap items-center gap-2 border-t pt-5">
                <div class="flex-1 flex max-w-md border-2 border-slate-100 rounded-xl overflow-hidden focus-within:border-blue-400 transition-all">
                    <input type="text" id="searchInput" placeholder="고객명/품목 입력..." class="flex-1 p-2.5 outline-none text-sm">
                    <button onclick="filterList()" class="bg-slate-100 px-4 py-2.5 text-slate-600 font-bold hover:bg-slate-200 transition-all border-l border-slate-100">확인</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleFilter('unpaid')" class="bg-rose-500 text-white px-4 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-rose-600 transition-all">미납자</button>
                    <button onclick="toggleFilter('pending')" class="bg-orange-500 text-white px-4 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-orange-600 transition-all">미처리</button>
                    <button onclick="setMonthlyFilter()" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-indigo-700 transition-all">이번 달</button>
                    <button onclick="resetFilters()" class="bg-slate-800 text-white px-4 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-slate-900 transition-all">전체</button>
                </div>
            </div>
        </div>

        <!-- 리스트 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto custom-scroll">
                <table id="main-table" class="w-full text-sm text-left">
                    <thead>
                        <tr class="bg-slate-900 text-white whitespace-nowrap">
                            <th class="p-4">날짜</th>
                            <th class="p-4">고객명</th>
                            <th class="p-4 text-center">방식</th>
                            <th class="p-4">품목</th>
                            <th class="p-4 text-right bg-orange-900/40">무자료</th>
                            <th class="p-4 text-right">매입가</th>
                            <th class="p-4 text-right">판매가</th>
                            <th class="p-4 text-right text-yellow-400 bg-slate-800">순익</th>
                            <th class="p-4 text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="data-list" class="divide-y divide-slate-100 text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Firebase 설정 (유지)
        const firebaseConfig = {
            apiKey: "AIzaSyDj1NuIhzszfuR6F-uNxf7mmiBIMdmdPRo",
            authDomain: "cavelsh-97a49.firebaseapp.com",
            projectId: "cavelsh-97a49",
            storageBucket: "cavelsh-97a49.firebasestorage.app",
            messagingSenderId: "427204872944",
            appId: "1:427204872944:web:e378535fd5bbf12dae1035",
            measurementId: "G-ZMWFZ9S7EB"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allData = [];
        let currentFilter = 'none'; 
        let currentFilterMode = 'all'; 
        let isAuthenticated = false;

        const yearSelect = document.getElementById('yearSelect');
        const curYear = new Date().getFullYear();
        for(let i = curYear - 2; i <= curYear + 2; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = `${i}년 내역`;
            if(i === curYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        function toggleAuth() {
            if (document.getElementById('mainPwInput').value === "0927") {
                isAuthenticated = true;
                document.getElementById('authStatus').innerText = "✅ 시스템 접근 승인됨";
                document.getElementById('excelBtn').disabled = false;
                document.getElementById('excelBtn').className = "bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold cursor-pointer hover:bg-emerald-700";
                document.getElementById('mainPwInput').classList.add('hidden');
                document.getElementById('authBtn').classList.add('hidden');
                filterList();
            } else { alert("암호 오류"); }
        }

        function syncUnpaidStatus() {
            const m = document.getElementById('paymentMethod').value;
            const s = document.getElementById('unpaidStatus');
            if (m === "미처리") s.value = "미처리";
            else if (s.value === "미처리") s.value = "입금완료";
        }

        db.collection("bills").orderBy("date", "desc").onSnapshot(snapshot => {
            allData = [];
            snapshot.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
            filterList();
        });

        function filterList() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const targetYear = document.getElementById('yearSelect').value;
            let filtered = allData;

            // 연도 필터링
            filtered = filtered.filter(d => (d.date || "").startsWith(targetYear));

            // 검색어 필터링 (확인 버튼 클릭 시에만 리스트 갱신됨)
            if (q) {
                filtered = filtered.filter(d => (d.customer || "").toLowerCase().includes(q) || (d.item || "").toLowerCase().includes(q));
            }

            // 특수 필터
            if(currentFilter === 'unpaid') filtered = filtered.filter(d => d.unpaidStatus === "미납");
            if(currentFilter === 'pending') filtered = filtered.filter(d => d.paymentMethod === "미처리");

            // 이번 달 필터 모드
            if (currentFilterMode === 'monthly') {
                const now = new Date();
                const curM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                filtered = filtered.filter(d => (d.date || "").startsWith(curM));
            }

            renderUI(filtered, targetYear);
        }

        function renderUI(listItems, targetYear) {
            let stats = { q1S:0, q1P:0, q1N:0, q2S:0, q2P:0, q2N:0, totalU:0, totalP:0, curM:0 };
            const now = new Date();
            const curYM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const listBody = document.getElementById('data-list');
            listBody.innerHTML = "";

            allData.forEach(b => {
                const dateParts = b.date ? b.date.split("-") : [];
                const y = dateParts[0];
                const m = parseInt(dateParts[1]) || 0;
                const isPending = (b.paymentMethod === "미처리");

                if(!isPending && b.date && b.date.startsWith(curYM)) stats.curM += (b.difference || 0);

                if(!isPending && y === targetYear) {
                    if(m >= 1 && m <= 6) { stats.q1S += (b.salesBill||0); stats.q1P += (b.purchaseBill||0); stats.q1N += (b.noDataAmount||0); }
                    else if(m >= 7 && m <= 12) { stats.q2S += (b.salesBill||0); stats.q2P += (b.purchaseBill||0); stats.q2N += (b.noDataAmount||0); }
                    stats.totalP += (b.difference || 0);
                }
                stats.totalU += (b.unpaidAmount || 0);
            });

            listItems.forEach(b => {
                const isPending = (b.paymentMethod === "미처리");
                const fmt = (v) => isAuthenticated ? Number(v).toLocaleString() : "****";
                const rowClass = isPending ? 'row-pending' : (b.unpaidStatus === '미납' ? 'row-unpaid' : '');

                listBody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b whitespace-nowrap ${rowClass}">
                        <td class="p-4 text-xs font-medium">${b.date || ''}</td>
                        <td class="p-4 font-bold text-slate-800">${b.customer || ''} ${b.unpaidStatus === '미납' ? '<span class="text-rose-500 text-[10px]">[미납]</span>' : ''}</td>
                        <td class="p-4 text-center"><span class="text-[10px] px-2 py-0.5 rounded ${isPending ? 'bg-orange-100 text-orange-600 font-bold' : 'bg-slate-100'}">${b.paymentMethod || ''}</span></td>
                        <td class="p-4 text-xs max-w-[150px] truncate">${b.item || ''}</td>
                        <td class="p-4 text-right text-orange-700 font-bold bg-orange-50/30">${fmt(b.noDataAmount || 0)}</td>
                        <td class="p-4 text-right">${fmt(b.purchasePrice || 0)}</td>
                        <td class="p-4 text-right font-bold text-slate-800">${fmt(b.salePrice || 0)}</td>
                        <td class="p-4 text-right font-black text-blue-700 bg-blue-50/50">${fmt(b.difference || 0)}</td>
                        <td class="p-4 text-center space-x-1">
                            <button onclick="editDoc('${b.id}')" class="text-[10px] bg-slate-500 text-white px-2 py-1 rounded">수정</button>
                            <button onclick="deleteDoc('${b.id}')" class="text-[10px] bg-rose-500 text-white px-2 py-1 rounded">삭제</button>
                        </td>
                    </tr>`;
            });

            const mask = (v) => isAuthenticated ? Number(v).toLocaleString() + "원" : "****";
            document.getElementById('q1-sales').innerText = mask(stats.q1S);
            document.getElementById('q1-purchase').innerText = mask(stats.q1P);
            document.getElementById('q1-nodata').innerText = mask(stats.q1N);
            document.getElementById('q2-sales').innerText = mask(stats.q2S);
            document.getElementById('q2-purchase').innerText = mask(stats.q2P);
            document.getElementById('q2-nodata').innerText = mask(stats.q2N);
            document.getElementById('total-unpaid').innerText = mask(stats.totalU);
            document.getElementById('total-profit').innerText = mask(stats.totalP);
            document.getElementById('cur-month-profit').innerText = mask(stats.curM);
        }

        function setMonthlyFilter() { currentFilterMode = 'monthly'; filterList(); }
        function toggleFilter(f) { currentFilter = (currentFilter === f) ? 'none' : f; filterList(); }
        function resetFilters() { currentFilter = 'none'; currentFilterMode = 'all'; document.getElementById('searchInput').value = ""; filterList(); }

        async function saveData() {
            const editId = document.getElementById('edit-id').value;
            const docData = {
                date: document.getElementById('date').value,
                customer: document.getElementById('customer').value,
                address: document.getElementById('address').value,
                item: document.getElementById('item').value,
                noDataAmount: Number(document.getElementById('noDataInput').value) || 0,
                purchasePrice: Number(document.getElementById('purchasePrice').value) || 0,
                salePrice: Number(document.getElementById('salePrice').value) || 0,
                paymentMethod: document.getElementById('paymentMethod').value,
                unpaidStatus: document.getElementById('unpaidStatus').value,
                memo: document.getElementById('memo').value
            };
            
            const diff = docData.salePrice - (docData.purchasePrice + docData.noDataAmount);
            const finalData = { 
                ...docData, 
                difference: diff,
                unpaidAmount: docData.unpaidStatus === "미납" ? diff : 0,
                salesBill: (docData.paymentMethod === "세금계산서" || docData.paymentMethod === "카드 결제") ? docData.salePrice : 0,
                purchaseBill: (!docData.item.includes("수리")) ? docData.purchasePrice : 0
            };

            try {
                if (editId) await db.collection("bills").doc(editId).update(finalData);
                else await db.collection("bills").add(finalData);
                alert("성공적으로 저장되었습니다."); resetForm();
            } catch (e) { alert("저장 실패"); }
        }

        function editDoc(id) {
            const d = allData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('date').value = d.date;
            document.getElementById('customer').value = d.customer;
            document.getElementById('address').value = d.address;
            document.getElementById('item').value = d.item;
            document.getElementById('noDataInput').value = d.noDataAmount;
            document.getElementById('purchasePrice').value = d.purchasePrice;
            document.getElementById('salePrice').value = d.salePrice;
            document.getElementById('paymentMethod').value = d.paymentMethod;
            document.getElementById('unpaidStatus').value = d.unpaidStatus;
            document.getElementById('memo').value = d.memo;
            document.getElementById('form-title').innerText = "✏️ 데이터 수정 중";
            window.scrollTo({top: 400, behavior: 'smooth'});
        }

        async function deleteDoc(id) { if(confirm("삭제하시겠습니까?")) await db.collection("bills").doc(id).delete(); }
        function resetForm() { document.getElementById('edit-id').value = ""; document.querySelectorAll('#input-fields input').forEach(i => i.value = ""); document.getElementById('form-title').innerText = "📝 데이터 입력 및 수정"; }
        function downloadExcel() { if(!isAuthenticated) return; const wb = XLSX.utils.table_to_book(document.getElementById("main-table")); XLSX.writeFile(wb, `매출내역_${new Date().toLocaleDateString()}.xlsx`); }
    </script>
</body>
</html>
